<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weighted GPA Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Meta tags for Apple/Mobile PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <h1>GPA Calculator</h1>
            <div class="gpa-display">
                <span class="gpa-label">Weighted GPA</span>
                <span class="gpa-value" id="final-gpa">0.00</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content-scroll">
            
            <!-- Controls Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-standard">Standard Grade</button>
                <button class="tab-btn" id="tab-exam">Exam Average</button>
            </div>

            <!-- Standard Grade Section -->
            <section class="card glass-card" id="section-standard">
                <h2>Add Standard Grade</h2>
                <div class="input-group">
                    <div class="input-field">
                        <label for="grade-select">Grade</label>
                        <select id="grade-select">
                            <option value="AA">AA (4.0)</option>
                            <option value="BA">BA (3.5)</option>
                            <option value="BB">BB (3.0)</option>
                            <option value="CB">CB (2.5)</option>
                            <option value="CC">CC (2.0)</option>
                            <option value="DC">DC (1.5)</option>
                            <option value="DD">DD (1.0)</option>
                            <option value="FF">FF (0.0)</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label for="weight-select">Weight</label>
                        <select id="weight-select">
                            <option value="1">1</option>
                            <option value="1.5">1.5</option>
                            <option value="2">2</option>
                            <option value="2.5">2.5</option>
                            <option value="3">3</option>
                            <option value="3.5">3.5</option>
                            <option value="4" selected>4</option>
                            <option value="4.5">4.5</option>
                            <option value="5">5</option>
                            <option value="5.5">5.5</option>
                            <option value="6">6</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" id="add-standard-btn">Add Grade</button>
            </section>

            <!-- Exam Average Section -->
            <section class="card glass-card hidden" id="section-exam">
                <h2>Add from Exams</h2>
                
                <div class="input-row">
                    <div class="input-field">
                        <label>Midterm Weight (%)</label>
                        <input type="number" id="midterm-weight" value="40" min="0" max="100">
                    </div>
                    <div class="input-field">
                        <label>Midterm Score</label>
                        <input type="number" id="midterm-score" placeholder="e.g. 85" min="0" max="100">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-field">
                        <label>Final Weight (%)</label>
                        <input type="number" id="final-weight" value="60" min="0" max="100">
                    </div>
                    <div class="input-field">
                        <label>Final Score</label>
                        <input type="number" id="final-score" placeholder="e.g. 90" min="0" max="100">
                    </div>
                </div>

                <div class="input-field">
                    <label for="exam-course-weight">Course Weight</label>
                    <select id="exam-course-weight">
                        <option value="1">1</option>
                        <option value="1.5">1.5</option>
                        <option value="2">2</option>
                        <option value="2.5">2.5</option>
                        <option value="3">3</option>
                        <option value="3.5">3.5</option>
                        <option value="4" selected>4</option>
                        <option value="4.5">4.5</option>
                        <option value="5">5</option>
                        <option value="5.5">5.5</option>
                        <option value="6">6</option>
                    </select>
                </div>

                <div class="exam-result hidden" id="exam-result-display">
                    <span class="exam-avg-label">Exam Average:</span>
                    <span class="exam-avg-val" id="exam-calculated-score">--</span>
                    <span class="exam-avg-grade" id="exam-calculated-grade">--</span>
                </div>

                <button class="btn btn-primary" id="add-exam-btn">Calculate & Add Course</button>
            </section>

            <!-- Course List -->
            <section class="card glass-card" id="course-list-section">
                <div class="list-header">
                    <h2>Courses Added</h2>
                    <button class="btn-text text-danger" id="clear-all-btn">Clear All</button>
                </div>
                <ul class="course-list" id="course-list">
                    <!-- Items will be injected here -->
                </ul>
            </section>

            <!-- Bottom Spacer -->
            <div class="spacer"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
